services:
  db:
    image: postgres:16-alpine
    container_name: trackyr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackyr
      POSTGRES_PASSWORD: trackyr
      POSTGRES_DB: trackyr
    ports:
      - "5434:5432"
    volumes:
      - trackyr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackyr"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: trackyr-server
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      DATABASE_URL: postgresql://trackyr:trackyr@db:5432/trackyr
      API_PORT: "8099"
      LOG_LEVEL: INFO
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_TO: ${EMAIL_TO:-}
      DAILY_REPORT_HOUR: ${DAILY_REPORT_HOUR:-21}
      WEEKLY_REPORT_DAY: ${WEEKLY_REPORT_DAY:-sun}
      WEEKLY_REPORT_HOUR: ${WEEKLY_REPORT_HOUR:-21}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8099/api/v1/summary/today')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  trackyr_pgdata:
